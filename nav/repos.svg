    <linearGradient id="sh" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#A855F7" stop-opacity="0"/><stop offset="0.5" stop-color="#A855F7" stop-opacity="0.6"/><stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
