<svg xmlns="http://www.w3.org/2000/svg" width="820" height="170" viewBox="0 0 820 170" fill="none" role="img" aria-label="KERNELLORD glitch">
  <title>KERNELLORD</title>
  <defs>
    <filter id="mosh" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.00001 0.18" numOctaves="1" seed="2" result="n">
        <animate attributeName="seed" values="2;7;2;14;2;9;2" dur="2.6s" repeatCount="indefinite" calcMode="discrete"/>
        <animate attributeName="baseFrequency" values="0.00001 0.18;0.00001 0.55;0.00001 0.05;0.00001 0.9;0.00001 0.18" dur="2.6s" repeatCount="indefinite" calcMode="discrete"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="20" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="820" height="170" rx="14" fill="#0D0D0D" stroke="#8B5CF6" stroke-opacity="0.35"/>
  <g font-family="'Courier New',monospace" font-weight="900" font-size="80" text-anchor="middle">
    <text x="406" y="112" fill="#B11226" filter="url(#mosh)" style="mix-blend-mode:screen">KERNELLORD<animate attributeName="x" values="406;399;408;404;406" dur="0.5s" repeatCount="indefinite" calcMode="discrete"/></text>
    <text x="414" y="112" fill="#A855F7" filter="url(#mosh)" style="mix-blend-mode:screen">KERNELLORD<animate attributeName="x" values="414;421;412;416;414" dur="0.5s" begin="0.12s" repeatCount="indefinite" calcMode="discrete"/></text>
    <text x="410" y="112" fill="#FFE9A8">KERNELLORD</text>
  </g>
</svg>
