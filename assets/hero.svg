<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" fill="none" role="img" aria-label="prodev2025 — Founder of TurboGem, Rust Systems Engineer">
  <title>prodev2025 — Founder of TurboGem · Rust Systems Engineer</title>
  <defs>
    <!-- Shared brand gradient: cyan -> violet -> magenta -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F5FF"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#FF00E5"/>
    </linearGradient>

    <!-- Animated wash gradient for the background glow (wide, shifts hue across) -->
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F5FF"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#FF00E5"/>
    </linearGradient>

    <!-- Specular sheen for the wordmark -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Neon glow -->
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for the ambient color wash -->
    <filter id="soft" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>

    <!-- Drifting tech grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1b2733" stroke-width="1"/>
    </pattern>

    <!-- Edge vignette to blend into GitHub-dark canvas -->
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.45" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0.95"/>
    </radialGradient>

    <!-- Clip the sheen sweep to the wordmark letterforms -->
    <clipPath id="wordclip">
      <text x="600" y="172" text-anchor="middle"
            font-family="ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace"
            font-size="104" font-weight="800" letter-spacing="2">prodev2025</text>
    </clipPath>

    <style>
      @keyframes washmove { 0% { transform: translateX(-160px); } 50% { transform: translateX(160px); } 100% { transform: translateX(-160px); } }
      @keyframes washfade { 0%,100% { opacity: 0.34; } 50% { opacity: 0.6; } }
      @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-40px); } }
      @keyframes sweep { 0% { transform: translateX(-520px); } 100% { transform: translateX(1260px); } }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes fillin { 0%,55% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes subin { 0%,60% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
      @keyframes rule { to { transform: scaleX(1); } }
      @keyframes twinkle { 0%,100% { opacity: 0.12; } 50% { opacity: 0.85; } }

      .wash    { transform-box: fill-box; transform-origin: center; animation: washmove 12s ease-in-out infinite, washfade 8s ease-in-out infinite; }
      .grid    { animation: drift 6s linear infinite; }
      .sheen   { animation: sweep 5.5s linear infinite; animation-delay: 2.6s; }
      .stroke  { stroke-dasharray: 2600; stroke-dashoffset: 2600; animation: draw 2.8s ease forwards; }
      .fill    { opacity: 0; animation: fillin 3.6s ease forwards; }
      .sub     { opacity: 0; transform-box: fill-box; transform-origin: center; animation: subin 1.6s ease forwards; animation-delay: 2.2s; }
      .ruler   { transform-box: fill-box; transform-origin: left center; transform: scaleX(0); animation: rule 1.4s ease forwards; animation-delay: 2.4s; }
      .p       { animation: twinkle 3.4s ease-in-out infinite; }

      @media (prefers-reduced-motion: reduce) {
        .wash, .grid, .sheen, .stroke, .fill, .sub, .ruler, .p { animation: none !important; }
        .stroke { stroke-dashoffset: 0; }
        .fill, .sub, .ruler, .p { opacity: 1; transform: none; }
      }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="300" fill="#0D1117"/>

  <!-- Ambient color wash (blurred, slowly sliding) -->
  <g filter="url(#soft)">
    <ellipse class="wash" cx="600" cy="150" rx="560" ry="120" fill="url(#wash)"/>
  </g>

  <!-- Drifting grid (seamless: one extra tile of slack) -->
  <g opacity="0.5">
    <rect class="grid" x="-40" y="0" width="1280" height="300" fill="url(#grid)"/>
  </g>

  <!-- Twinkling particles -->
  <g fill="#00F5FF">
    <circle class="p" cx="150" cy="64"  r="1.8"/>
    <circle class="p" cx="1040" cy="58" r="1.8" style="animation-delay:1.1s"/>
    <circle class="p" cx="300" cy="240" r="1.6" style="animation-delay:0.6s"/>
    <circle class="p" cx="980" cy="232" r="1.6" style="animation-delay:1.8s"/>
    <circle class="p" cx="90"  cy="180" r="1.4" style="animation-delay:2.3s" fill="#8B5CF6"/>
    <circle class="p" cx="1130" cy="150" r="1.4" style="animation-delay:0.9s" fill="#FF00E5"/>
    <circle class="p" cx="520" cy="44"  r="1.4" style="animation-delay:1.5s" fill="#8B5CF6"/>
    <circle class="p" cx="700" cy="252" r="1.4" style="animation-delay:2.7s" fill="#FF00E5"/>
  </g>

  <!-- Wordmark: stroke draws first, gradient fill fades in -->
  <g filter="url(#glow)">
    <text class="stroke" x="600" y="172" text-anchor="middle"
          font-family="ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace"
          font-size="104" font-weight="800" letter-spacing="2"
          fill="none" stroke="url(#brand)" stroke-width="1.6">prodev2025</text>
    <text class="fill" x="600" y="172" text-anchor="middle"
          font-family="ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace"
          font-size="104" font-weight="800" letter-spacing="2"
          fill="url(#brand)">prodev2025</text>
  </g>

  <!-- Specular sheen clipped to the letters -->
  <g clip-path="url(#wordclip)">
    <rect class="sheen" x="0" y="60" width="240" height="140" fill="url(#sheen)" opacity="0.7"/>
  </g>

  <!-- Accent rule under the wordmark -->
  <rect class="ruler" x="430" y="196" width="340" height="2" rx="1" fill="url(#brand)" opacity="0.85"/>

  <!-- Subtitle -->
  <text class="sub" x="600" y="234" text-anchor="middle"
        font-family="ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace"
        font-size="23" font-weight="500" letter-spacing="3" fill="#9DA7B3">Founder of TurboGem · Rust Systems Engineer</text>

  <!-- Vignette blend into GitHub-dark -->
  <rect width="1200" height="300" fill="url(#vig)"/>
</svg>
