<svg xmlns="http://www.w3.org/2000/svg" width="150" height="230" viewBox="0 0 150 230" role="img" aria-label="forge fire">
  <title>forge</title>
  <defs>
    <linearGradient id="f-out" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#FFC83D"/><stop offset="0.45" stop-color="#F5B301"/><stop offset="1" stop-color="#B11226"/>
    </linearGradient>
    <linearGradient id="f-mid" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#FFF1C2"/><stop offset="0.55" stop-color="#FFC83D"/><stop offset="1" stop-color="#F5B301"/>
    </linearGradient>
    <radialGradient id="f-core" cx="50%" cy="62%" r="55%">
      <stop offset="0" stop-color="#FFFDF5"/><stop offset="0.6" stop-color="#FFF1C2"/><stop offset="1" stop-color="#FFC83D" stop-opacity="0"/>
    </radialGradient>
    <filter id="lick" x="-40%" y="-30%" width="180%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.03" numOctaves="2" seed="3" result="n">
        <animate attributeName="baseFrequency" dur="6s" values="0.018 0.03;0.026 0.05;0.018 0.03" repeatCount="indefinite"/>
        <animate attributeName="seed" dur="3s" values="0;9" calcMode="discrete" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" xChannelSelector="R" yChannelSelector="G" scale="9">
        <animate attributeName="scale" dur="3.4s" values="5;13;7;11;5" repeatCount="indefinite"/>
      </feDisplacementMap>
    </filter>
    <filter id="glow" x="-60%" y="-40%" width="220%" height="180%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <!-- warm glow halo -->
  <ellipse cx="75" cy="150" rx="42" ry="60" fill="#F5B301" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" values="0.12;0.26;0.12" dur="2.4s" repeatCount="indefinite"/>
  </ellipse>
  <g filter="url(#lick)">
    <path fill="url(#f-out)" d="M75 24 C104 84 132 126 100 184 C90 210 86 214 75 214 C64 214 60 210 50 184 C18 126 46 84 75 24 Z"/>
    <path fill="url(#f-mid)" d="M76 70 C96 108 114 136 92 178 C85 198 82 202 75 202 C68 202 65 198 58 178 C40 136 56 108 76 70 Z"/>
    <path fill="url(#f-core)" d="M75 108 C87 132 96 150 84 174 C80 190 78 192 75 192 C72 192 70 190 66 174 C54 150 63 132 75 108 Z"/>
  </g>
  <!-- rising sparks -->
  <g fill="#FFC83D">
    <circle cx="64" cy="120" r="2"><animate attributeName="cy" values="150;10" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="88" cy="120" r="1.6" fill="#F5B301"><animate attributeName="cy" values="160;0" dur="3.2s" begin="-1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="-1s" repeatCount="indefinite"/></circle>
    <circle cx="76" cy="120" r="2.2"><animate attributeName="cy" values="150;-10" dur="2.9s" begin="-1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.9s" begin="-1.8s" repeatCount="indefinite"/></circle>
    <circle cx="54" cy="120" r="1.5" fill="#B11226"><animate attributeName="cy" values="155;30" dur="3.6s" begin="-0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.9;0" dur="3.6s" begin="-0.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
