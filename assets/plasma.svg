<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="180" viewBox="0 0 1000 180" role="img" aria-label="KernelLord plasma">
  <title>plasma</title>
  <defs>
    <filter id="plasma" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.010 0.015" numOctaves="3" seed="7" result="n">
        <animate attributeName="baseFrequency" dur="18s" values="0.009 0.013;0.018 0.024;0.009 0.013" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
        <animate attributeName="seed" dur="40s" values="0;30" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix in="n" type="matrix" values="0.95 0 0 0 0.06  0.40 0 0 0 0.02  1.05 0 0 0 0.22  0 0 0 0.9 0.05"/>
    </filter>
    <radialGradient id="vig2" cx="50%" cy="50%" r="72%"><stop offset="0" stop-color="#0D0D0D" stop-opacity="0"/><stop offset="1" stop-color="#070709" stop-opacity="0.9"/></radialGradient>
    <linearGradient id="pt" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FFF7D6"/><stop offset="1" stop-color="#A855F7"/></linearGradient>
  </defs>
  <rect width="1000" height="180" rx="16" fill="#070709"/>
  <rect width="1000" height="180" rx="16" filter="url(#plasma)" opacity="0.9"/>
  <rect width="1000" height="180" rx="16" fill="url(#vig2)"/>
  <text x="500" y="104" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-weight="800" font-size="30" letter-spacing="8" fill="url(#pt)">WAKE UP TO REALITY</text>
  <rect x="0.75" y="0.75" width="998.5" height="178.5" rx="16" fill="none" stroke="#8B5CF6" stroke-opacity="0.4"/>
</svg>
