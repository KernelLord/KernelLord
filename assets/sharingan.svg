<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="KernelLord sharingan">
  <title>KernelLord</title>
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0263F"/><stop offset="55%" stop-color="#B11226"/>
      <stop offset="82%" stop-color="#5a0a14"/><stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
    <filter id="ring-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
  </defs>
  <!-- outer gold ring with breathing glow -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#F5B301" stroke-width="2" opacity="0.55" filter="url(#ring-glow)">
    <animate attributeName="opacity" values="0.35;0.8;0.35" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#F5B301" stroke-width="3"/>
  <!-- iris -->
  <circle cx="100" cy="100" r="80" fill="url(#iris)" stroke="#A855F7" stroke-width="2"/>
  <!-- rinnegan ripple rings: phase in periodically over the sharingan -->
  <g fill="none" stroke="#A855F7" stroke-width="1.4" opacity="0">
    <animate attributeName="opacity" values="0;0;0.85;0" keyTimes="0;0.62;0.8;1" dur="9s" repeatCount="indefinite"/>
    <circle cx="100" cy="100" r="20"/><circle cx="100" cy="100" r="36"/>
    <circle cx="100" cy="100" r="52"/><circle cx="100" cy="100" r="68"/>
  </g>
  <!-- rotating tomoe + pupil -->
  <g fill="#0D0D0D">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="7s" repeatCount="indefinite"/>
    <circle cx="100" cy="100" r="11"/>
    <path d="M100 40 a15 15 0 1 1 -9 27 a24 24 0 0 0 9 -27 Z"/>
    <path d="M152 130 a15 15 0 1 1 -23 -14 a24 24 0 0 0 23 14 Z"/>
    <path d="M48 130 a15 15 0 1 1 23 -14 a24 24 0 0 0 -23 14 Z"/>
  </g>
</svg>
