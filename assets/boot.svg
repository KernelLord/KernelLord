<svg xmlns="http://www.w3.org/2000/svg" width="820" height="440" viewBox="0 0 820 440" role="img" aria-label="KernelLord boot sequence terminal">
  <title>KernelLord — boot sequence</title>
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F5B301"/><stop offset="0.5" stop-color="#A855F7"/><stop offset="1" stop-color="#B11226"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-50%" width="140%" height="200%"><feGaussianBlur stdDeviation="0.6"/></filter>
  </defs>
  <!-- window -->
  <rect x="2" y="2" width="816" height="436" rx="14" fill="#0D0D0D" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="2" y="2" width="816" height="46" rx="14" fill="#161922"/>
  <rect x="2" y="34" width="816" height="14" fill="#161922"/>
  <circle cx="30" cy="25" r="7" fill="#B11226"/><circle cx="54" cy="25" r="7" fill="#F5B301"/><circle cx="78" cy="25" r="7" fill="#54E59A"/>
  <text x="410.0" y="30" text-anchor="middle" font-size="15" fill="#7d8590" font-family="'JetBrains Mono',ui-monospace,monospace">kernellord@systems: ~/turbogem</text>
  <!-- gradient underline of title bar -->
  <rect x="2" y="46" width="816" height="2" fill="url(#bar)"/>
  <g font-family="'JetBrains Mono','Fira Code',ui-monospace,'Courier New',monospace" filter="url(#g)">
  <text x="34" y="120" font-size="21" font-weight="500" fill="#A855F7" opacity="0">kernellord@systems
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.0689;0.0689;0.93;1" dur="9.0s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <text x="34" y="156" font-size="21" font-weight="700" fill="#c9d1d9" opacity="0">  ~/turbogem $ ./boot --profile kernellord
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1378;0.1378;0.93;1" dur="9.0s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <text x="34" y="192" font-size="21" font-weight="500" fill="#54E59A" opacity="0">[  OK  ]  rust core .................. zero-unsafe
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2067;0.2067;0.93;1" dur="9.0s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <text x="34" y="228" font-size="21" font-weight="500" fill="#54E59A" opacity="0">[  OK  ]  async runtime .............. tokio
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2756;0.2756;0.93;1" dur="9.0s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <text x="34" y="264" font-size="21" font-weight="500" fill="#54E59A" opacity="0">[  OK  ]  security layer ............. paranoid
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3444;0.3444;0.93;1" dur="9.0s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <text x="34" y="300" font-size="21" font-weight="500" fill="#F5B301" opacity="0">[  OK  ]  turbogem services .......... [private]
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4133;0.4133;0.93;1" dur="9.0s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <text x="34" y="336" font-size="21" font-weight="500" fill="#54E59A" opacity="0">[  OK  ]  founder-mode ............... uptime 24/7
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4822;0.4822;0.93;1" dur="9.0s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <text x="34" y="372" font-size="21" font-weight="700" fill="#F5B301" opacity="0">ready.  wake up to reality.
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5511;0.5511;0.93;1" dur="9.0s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <rect x="284" y="354" width="13" height="22" fill="#F5B301">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.05s" repeatCount="indefinite"/>
  </rect>
  </g>
