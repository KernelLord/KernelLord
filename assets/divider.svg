<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 10" width="1200" height="10" preserveAspectRatio="none" role="img" aria-label="">
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#F5B301"/><stop offset="0.25" stop-color="#FFC83D"/>
      <stop offset="0.5" stop-color="#A855F7"/><stop offset="0.75" stop-color="#B11226"/>
      <stop offset="1" stop-color="#F5B301"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;0 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFF7D6"/><stop offset="0.4" stop-color="#FFC83D"/><stop offset="1" stop-color="#FFC83D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="3" width="1200" height="4" rx="2" fill="url(#flow)"/>
  <!-- traveling spark -->
  <circle cy="5" r="9" fill="url(#spark)">
    <animate attributeName="cx" values="-20;1220" dur="3.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.45 0 0.55 1"/>
  </circle>
</svg>
