# Renders the contribution-graph "snake" (Platane/snk) into the `output` branch.
# Output filenames MUST match what README.md references:
#   output/github-snake.svg        (light/neutral)
#   output/github-snake-dark.svg   (dark, brand-neon palette)
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # run manually to seed the output branch
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00F5FF&color_dots=#161b22,#5ec8f5,#8B5CF6,#c06bff,#FF00E5

      - name: Push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
