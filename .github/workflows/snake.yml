name: Generate Snake

on:
  # Re-render twice a day so the snake stays current
  schedule:
    - cron: "0 */12 * * *"
  # Run manually from the Actions tab
  workflow_dispatch:
  # Re-render on every push to the default branch
  push:
    branches:
      - main

# Needed so the action can push the generated SVGs to the output branch
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          # Filenames MUST match what README.md references:
          #   output/github-snake.svg, output/github-snake-dark.svg
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif?color_snake=#8B5CF6&color_dots=#0D1117,#5ec8f5,#8B5CF6,#c06bff,#FF00E5

      - name: Push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
