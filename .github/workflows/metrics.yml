# OPTIONAL — the lowlighter/metrics "flex": full-year isometric calendar,
# in-depth languages, habits, and the earned-achievements wall.
#
# REQUIRES a CLASSIC Personal Access Token saved as repo secret METRICS_TOKEN
# (scopes: repo + read:org + read:user). The built-in GITHUB_TOKEN lacks the
# scope several of these plugins need. Each step writes its OWN single-plugin
# SVG (base: "") so the README can place them independently.
# To show them, uncomment the metrics <details> block in README.md.
name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Full-year isometric contribution calendar (the signature metrics flex)
      - name: Isocalendar (full year)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prodev2025
          filename: metrics.plugin.isocalendar.full.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Tbilisi

      # Accurate languages via linguist (clones repos) — honest Rust/Python/TS split
      - name: Languages (in depth)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prodev2025
          filename: metrics.plugin.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

      # Commit-time-of-day + indent style
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prodev2025
          filename: metrics.plugin.habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: Asia/Tbilisi

      # Earned-achievements wall (honest — only what the account unlocked)
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prodev2025
          filename: metrics.plugin.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
