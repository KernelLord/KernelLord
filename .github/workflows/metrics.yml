# OPTIONAL widget. Generates a rich SVG (languages breakdown, isometric calendar,
# activity) committed to the repo as github-metrics.svg.
# To show it, add this anywhere in README.md:
#   <img src="./github-metrics.svg" width="100%" alt="metrics" />
#
# Requires a CLASSIC Personal Access Token (scope: public_repo) stored as a
# repo secret named METRICS_TOKEN. If you don't want metrics, delete this file.

name: Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Classic PAT (public_repo scope) stored as a repo secret
          token: ${{ secrets.METRICS_TOKEN }}
          user: prodev2025
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Tbilisi
          # Languages plugin
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          # Isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
